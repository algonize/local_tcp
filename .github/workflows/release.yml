# Local TCP Bridge — Release Pipeline
# Every push to `main` builds all installers and publishes/updates a GitHub
# Release tagged from the `version` field in manifest.json (e.g. v2.0.0). The
# extension popup downloads from /releases/latest/download/<asset>, so users
# always get the newest build automatically — bump manifest.json `version` to
# cut a new release; re-pushing the same version just refreshes the assets.

name: Build Release Installers

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  binaries:
    name: Build Go binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - name: Cross-compile all targets
        run: |
          cd host-go
          bash build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: go-binaries
          path: host-go/dist/

  linux-installer:
    name: Linux .run installer
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: go-binaries, path: host-go/dist }
      - name: Build self-extracting installer
        run: |
          cd installers/linux
          bash build_run.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: |
            installers/linux/dist/localtcp-linux-installer.run
            installers/linux/dist/localtcp-linux-uninstaller.run

  windows-installer:
    name: Windows .exe installer
    needs: binaries
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: go-binaries, path: host-go/dist }
      - name: Compile Inno Setup installer + uninstaller
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installers\windows\installer.iss
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installers\windows\uninstaller.iss
        shell: pwsh
      # NOTE: add a code-signing step here once you have a certificate
      # (signtool sign /fd SHA256 ...) to avoid SmartScreen warnings.
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            installers/windows/Output/localtcp-windows-installer.exe
            installers/windows/Output/localtcp-windows-uninstaller.exe

  mac-installer:
    name: macOS .pkg installer
    needs: binaries
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: go-binaries, path: host-go/dist }
      - name: Import Developer ID certificates
        env:
          MAC_APP_CERT_BASE64: ${{ secrets.MAC_APP_CERT_BASE64 }}
          MAC_INSTALLER_CERT_BASE64: ${{ secrets.MAC_INSTALLER_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          # Make our keychain the default + searchable so signing tools find the certs
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          security default-keychain -s "$KEYCHAIN"

          echo "$MAC_APP_CERT_BASE64"       | base64 --decode > "$RUNNER_TEMP/app.p12"
          echo "$MAC_INSTALLER_CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/installer.p12"
          security import "$RUNNER_TEMP/app.p12"       -k "$KEYCHAIN" -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security import "$RUNNER_TEMP/installer.p12" -k "$KEYCHAIN" -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          # Let codesign/productsign use the keys without an interactive prompt
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/app.p12" "$RUNNER_TEMP/installer.p12"
          echo "Imported identities:"; security find-identity -v | grep "Developer ID" || true
      - name: Build, sign & notarize .pkg (installer + uninstaller)
        env:
          AC_APPLE_ID: ${{ secrets.AC_APPLE_ID }}
          AC_TEAM_ID: ${{ secrets.AC_TEAM_ID }}
          AC_APP_PASSWORD: ${{ secrets.AC_APP_PASSWORD }}
        run: |
          cd installers/mac
          bash build_pkg.sh
          bash build_uninstall_pkg.sh
      - name: Verify notarization
        run: |
          spctl --assess --type install -vv installers/mac/dist/localtcp-mac-installer.pkg
          spctl --assess --type install -vv installers/mac/dist/localtcp-mac-uninstaller.pkg
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: |
            installers/mac/dist/localtcp-mac-installer.pkg
            installers/mac/dist/localtcp-mac-uninstaller.pkg

  release:
    name: Publish GitHub Release
    needs: [linux-installer, windows-installer, mac-installer]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read version from manifest.json
        id: ver
        run: echo "version=$(jq -r .version manifest.json)" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with: { path: assets, merge-multiple: true }
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Local TCP v${{ steps.ver.outputs.version }}
          files: |
            assets/localtcp-linux-installer.run
            assets/localtcp-linux-uninstaller.run
            assets/localtcp-windows-installer.exe
            assets/localtcp-windows-uninstaller.exe
            assets/localtcp-mac-installer.pkg
            assets/localtcp-mac-uninstaller.pkg
          generate_release_notes: true
