<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Local TCP Bridge</title>
  <style>
    :root {
      --primary: #1a73e8;
      --primary-hover: #1557b0;
      --bg: #ffffff;
      --text: #3c4043;
      --gray: #5f6368;
      --border: #dadce0;
      --success: #1e8e3e;
      --error: #d93025;
      --warning: #f29900;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      width: 320px;
      margin: 0;
      padding: 16px;
      color: var(--text);
      background: var(--bg);
      font-size: 14px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      width: 24px;
      height: 24px;
      background: var(--primary);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 12px;
    }

    .title {
      font-weight: 600;
      font-size: 16px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 4px 8px;
      background: #f1f3f4;
      border-radius: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #bdc1c6;
    }

    .dot.active { background: var(--success); }
    .dot.error { background: var(--error); }

    .state { display: none; }
    .state.active { display: block; }

    /* Setup Steps */
    .setup-title {
      font-weight: 600;
      margin-bottom: 12px;
    }

    .steps {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .step {
      display: flex;
      gap: 12px;
    }

    .step-num {
      width: 20px;
      height: 20px;
      background: #e8f0fe;
      color: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .step-text {
      font-size: 13px;
      line-height: 1.4;
    }

    /* Dashboard */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .section-title {
      font-weight: 600;
      font-size: 13px;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .field-group {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 11px;
      font-weight: 600;
      color: var(--gray);
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input {
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 13px;
      flex: 1;
      outline: none;
    }

    input:focus { border-color: var(--primary); }

    .port-input { width: 70px; flex: none; }

    .actions {
      display: flex;
      gap: 8px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      flex: 1;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-secondary {
      background: white;
      color: var(--primary);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }

    .btn-secondary:hover { background: #f8f9fa; }

    .btn-block { width: 100%; display: block; }

    .tiny-action {
      background: none;
      border: none;
      color: var(--primary);
      font-size: 11px;
      cursor: pointer;
      padding: 0;
    }

    .tiny-action:hover { text-decoration: underline; }

    /* Logs */
    .log-container {
      margin-top: 20px;
    }

    .log-box {
      background: #202124;
      color: #e8eaed;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 11px;
      padding: 10px;
      border-radius: 4px;
      height: 120px;
      overflow-y: auto;
      display: flex;
      flex-direction: column-reverse;
    }

    .log-entry { margin-bottom: 4px; line-height: 1.4; }
    .log-time { color: #9aa0a6; margin-right: 8px; }
    .log-msg.success { color: #81c995; }
    .log-msg.error { color: #f28b82; }
    .log-msg.warning { color: #fdd663; }

    .common-footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand">
      <div class="logo">T</div>
      <div class="title">Local TCP</div>
    </div>
    <div class="status-badge">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Checking...</span>
    </div>
  </div>

  <!-- State 1: Setup Required -->
  <div class="state setup-state active" id="setupState">
    <div class="setup-title">Setup Required</div>
    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-text">Download the <b>Setup Kit</b> below.</div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-text">Run the installer for your computer.</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-text"><b>Restart Chrome</b> to activate the bridge.</div>
      </div>
    </div>
  </div>

  <!-- State 2: Dashboard -->
  <div class="state dashboard-state" id="dashboardState">
    <div class="section-header">
      <div class="section-title">Configuration</div>
      <button class="tiny-action" id="resetConfigBtn">Reset DB</button>
    </div>
    
    <div class="field-group">
      <div class="field">
        <label>Network Address</label>
        <div class="input-row">
          <input type="text" id="hostInput" placeholder="192.168.1.100" />
          <input type="number" id="portInput" class="port-input" placeholder="9100" />
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn-primary" id="saveBtn">Save Config</button>
      <button class="btn-secondary" id="testBtn">Test Ping</button>
    </div>

    <div class="log-container">
      <div class="section-header">
        <div class="section-title">Activity Monitor</div>
        <button class="tiny-action" id="clearLogsBtn">Clear Logs</button>
      </div>
      <div class="log-box" id="logBox"></div>
    </div>
  </div>

  <!-- Common Footer Actions -->
  <div class="common-footer">
    <div class="setup-desc" style="text-align: center; margin-bottom: 8px; font-size: 11px; opacity: 0.8;">
      Need to download or remove the bridge?
    </div>
    <button class="btn-secondary btn-block" id="downloadBtn" style="margin-bottom: 20px;">
      Download Setup Kit
    </button>
  </div>

  <script src="jszip.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
