<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Local TCP Bridge</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --bg-dark: #0f172a;
      --bg-card: rgba(30, 41, 59, 0.7);
      --accent-primary: #5DC095;
      --accent-glow: rgba(93, 192, 149, 0.2);
      --success: #5DC095;
      --error: #fb7185;
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
      --shadow-neon: 0 0 20px var(--accent-glow);
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      width: 360px;
      margin: 0;
      padding: 0;
      background: var(--bg-dark);
      color: var(--text-main);
      overflow-x: hidden;
    }

    .container {
      padding: 24px;
      background: linear-gradient(180deg, rgba(93, 192, 149, 0.05) 0%, rgba(15, 23, 42, 0) 100%);
      min-height: 500px;
    }

    /* Header & Status */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-box {
      width: 32px;
      height: 32px;
      background: #ffffff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-neon);
      overflow: hidden;
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .brand h1 {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.5px;
    }

    .status-badge {
      padding: 6px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(4px);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #475569;
    }
    .dot.active { background: var(--success); box-shadow: 0 0 10px var(--success); }
    .dot.error { background: var(--error); box-shadow: 0 0 10px var(--error); }

    /* State Management */
    .state { display: none; margin-bottom: 24px; animation: slideUp 0.3s ease-out; }
    .state.active { display: block; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      backdrop-filter: blur(8px);
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 16px;
    }

    /* Form Fields */
    .field-row { display: flex; gap: 12px; margin-bottom: 16px; }
    .input-wrapper { flex: 1; }
    .input-wrapper label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
    
    input {
      width: 100%;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      color: white;
      font-size: 13px;
      transition: all 0.2s;
    }

    input:focus { border-color: var(--accent-primary); outline: none; box-shadow: 0 0 0 2px rgba(93, 192, 149, 0.1); }

    .port-input { width: 80px; }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent-primary);
      color: var(--bg-dark);
    }
    .btn-primary:hover { transform: translateY(-1px); opacity: 0.9; }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: white;
    }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }

    .btn-test { width: auto; flex: 1; }

    /* Activity Monitor */
    .activity-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .log-box {
      height: 120px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      padding: 12px;
      font-family: 'Monaco', monospace;
      font-size: 11px;
      overflow-y: auto;
      border: 1px solid var(--border);
    }

    .log-entry { margin-bottom: 6px; display: flex; gap: 8px; }
    .log-time { color: var(--text-dim); }
    .log-msg.success { color: var(--success); }
    .log-msg.error { color: var(--error); }

    /* Footer */
    .footer {
      margin-top: 24px;
      border-top: 1px solid var(--border);
      padding-top: 24px;
      text-align: center;
    }

    .footer p { font-size: 12px; color: var(--text-dim); margin-bottom: 12px; }

    .step-list { margin-bottom: 20px; }
    .step-item { display: flex; gap: 12px; margin-bottom: 12px; align-items: flex-start; }
    .step-indicator { 
      width: 20px; height: 20px; background: rgba(93, 192, 149, 0.1); 
      color: var(--accent-primary); border-radius: 50%; display: flex; 
      align-items: center; justify-content: center; font-size: 10px; font-weight: 800;
    }
    .step-text { font-size: 12px; color: var(--text-dim); line-height: 1.5; }
    .step-text b { color: white; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    .tiny-btn { background: none; border: none; color: var(--accent-primary); font-size: 11px; cursor: pointer; padding: 0;}
    .tiny-btn:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">
        <div class="logo-box">
          <img src="icons/icon128.png" alt="Logo">
        </div>
        <h1>Local TCP</h1>
      </div>
      <div class="status-badge">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">DETECTING...</span>
      </div>
    </div>

    <!-- SEUP STATE -->
    <div class="state active" id="setupState">
      <div class="card">
        <div class="card-title">System Setup</div>
        <div class="step-list">
          <div class="step-item">
            <div class="step-indicator">1</div>
            <div class="step-text">Download the <b>Setup Bundle</b> below.</div>
          </div>
          <div class="step-item">
            <div class="step-indicator">2</div>
            <div class="step-text">Follow the <b>Terminal Guide</b> in the bundle to link the bridge.</div>
          </div>
          <div class="step-item">
            <div class="step-indicator">3</div>
            <div class="step-text"><b>Restart Chrome</b> to power up your hardware.</div>
          </div>
        </div>
      </div>
    </div>

    <!-- DASHBOARD STATE -->
    <div class="state" id="dashboardState">
      <div class="card">
        <div class="activity-header">
          <div class="card-title">Network Hub</div>
          <button class="tiny-btn" id="resetConfigBtn">Reset Config</button>
        </div>
        <div class="field-row">
          <div class="input-wrapper">
            <label>IP Address</label>
            <input type="text" id="hostInput" placeholder="192.168.1.100" />
          </div>
          <div class="input-wrapper port-input">
            <label>Port</label>
            <input type="number" id="portInput" placeholder="9100" />
          </div>
        </div>
        <div class="field-row">
          <button class="btn btn-primary" id="saveBtn">Save Settings</button>
          <button class="btn btn-secondary btn-test" id="testBtn">Test Connection</button>
        </div>
      </div>

      <div class="card" style="margin-bottom: 0;">
        <div class="activity-header">
          <div class="card-title">Activity Monitor</div>
          <button class="tiny-btn" id="clearLogsBtn">Clear</button>
        </div>
        <div class="log-box" id="logBox"></div>
      </div>
    </div>

    <div class="footer">
      <p>Need to manage your bridge drivers?</p>
      <button class="btn btn-secondary" id="downloadBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        Download Setup Kit
      </button>
    </div>
  </div>

  <script src="jszip.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
