<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Local TCP</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary: #5dc095;
      --primary-dim: rgba(93, 192, 149, 0.1);
      --primary-glow: rgba(93, 192, 149, 0.25);
      --bg: #0b0b0d;
      --surface: #141417;
      --surface-bright: #1c1c21;
      --border: #26262b;
      --text: #ffffff;
      --text-dim: #94949e;
      --error: #ff5858;
      --success: #5dc095;
      --radius: 12px;
      --font-main: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      min-height: 460px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      overflow-x: hidden;
    }

    /* ── Header ────────────────────────────────────────── */
    .header {
      padding: 24px 20px 20px;
      background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 4px;
    }

    .logo-box {
      width: 36px;
      height: 36px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px var(--primary-glow);
    }

    .logo-box svg {
      width: 22px;
      height: 22px;
      color: #000;
      stroke-width: 2.5;
    }

    .title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .tagline {
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 500;
      line-height: 1.4;
    }

    /* ── Content ───────────────────────────────────────── */
    .content { padding: 20px; }

    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      margin-bottom: 12px;
      font-weight: 700;
    }

    /* ── Input Field ───────────────────────────────────── */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 24px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
    }

    .input-container {
      position: relative;
      display: flex;
      gap: 8px;
    }

    input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 12px 14px;
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
      transition: all 0.2s ease;
    }

    input:focus {
      border-color: var(--primary);
      background: var(--surface-bright);
      box-shadow: 0 0 0 4px var(--primary-dim);
    }

    .port-input { width: 90px; flex: none; }

    /* ── Buttons ───────────────────────────────────────── */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
    }

    button {
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid transparent;
      outline: none;
    }

    .btn-primary {
      background: var(--primary);
      color: #000;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px var(--primary-glow);
      filter: brightness(1.05);
    }

    .btn-secondary {
      background: transparent;
      border-color: var(--border);
      color: var(--text);
    }

    .btn-secondary:hover {
      background: var(--surface);
      border-color: var(--primary);
      color: var(--primary);
    }

    button:active { transform: translateY(0); }

    /* ── Activity Log ──────────────────────────────────── */
    .log-container {
      margin-top: 28px;
    }

    .log-box {
      background: #000;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      height: 100px;
      overflow-y: auto;
      font-family: var(--font-mono);
      font-size: 10px;
      line-height: 1.6;
      color: var(--text-dim);
    }

    .log-entry { margin-bottom: 4px; display: flex; gap: 8px; }
    .log-time { color: #555; flex-shrink: 0; }
    .log-msg { word-break: break-all; }
    .log-msg.success { color: var(--success); }
    .log-msg.error { color: var(--error); }

    /* ── Status indicator ──────────────────────────────── */
    .status-badge {
      position: absolute;
      top: 24px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #444;
    }

    .dot.active {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
      animation: pulse 2s infinite;
    }

    .status-text {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="status-badge">
      <div class="dot active"></div>
      <span class="status-text">Active</span>
    </div>
    <div class="brand">
      <div class="logo-row">
        <div class="logo-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </div>
        <span class="title">Local TCP</span>
      </div>
      <p class="tagline">Your browser can finally talk with local TCP.</p>
    </div>
  </div>

  <div class="content">
    <div class="section-title">Configuration</div>
    <div class="field-group">
      <div class="field">
        <label>Network Address</label>
        <div class="input-container">
          <input type="text" id="hostInput" placeholder="192.168.1.100" />
          <input type="number" id="portInput" class="port-input" placeholder="9100" />
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn-primary" id="saveBtn">Save Config</button>
      <button class="btn-secondary" id="testBtn">Test Connection</button>
    </div>

    <div class="log-container">
      <div class="section-title">Activity Monitor</div>
      <div class="log-box" id="logBox">
        <div class="log-entry">
          <span class="log-time">System</span>
          <span class="log-msg">Bridge initialized and ready.</span>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
